<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HouseOS">

    <title>HouseOS Unified Tracker</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging-compat.js"></script>
    
    <style>
        :root { color-scheme: dark; }
        body { background-color: #111827; color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .spinner { border: 3px solid #374151; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .mini-scroll::-webkit-scrollbar { width: 4px; }
        .mini-scroll::-webkit-scrollbar-track { background: transparent; }
        .mini-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. CONFIGURATION
        // ==========================================
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbytkALz5wXHB9pMfbSOTqYtKLV6yp5H5wp3QdDupQF89uggt_HiYMbrOXP5ubw52_i0/exec"; 
        
        const firebaseConfig = {
            apiKey: "AIzaSyAam1HxZANk_AjQG_nScjoYBPGB8y2Xf-8",
            authDomain: "nexus-os-949c4.firebaseapp.com",
            projectId: "nexus-os-949c4",
            storageBucket: "nexus-os-949c4.firebasestorage.app",
            messagingSenderId: "329666668961",
            appId: "1:329666668961:web:df7689e4ea2c3e9119c3e0",
            measurementId: "G-DR9QGBXTK6"
        };

        let messaging = null;
        try {
            if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
                firebase.initializeApp(firebaseConfig);
                messaging = firebase.messaging();
            }
        } catch (e) { console.error("Firebase init error", e); }

        const { useState, useEffect, useMemo, useRef } = React;

        // ==========================================
        // 2. SUB-COMPONENTS
        // ==========================================
        function Calculator({ onBack }) {
            const [salary, setSalary] = useState('');
            const [stdDays, setStdDays] = useState('30');
            const [stdHours, setStdHours] = useState('8');
            const [otDays, setOtDays] = useState('');
            const [otHours, setOtHours] = useState('');

            const result = useMemo(() => {
                const s = parseFloat(salary) || 0;
                const d = parseFloat(stdDays) || 1;
                const h = parseFloat(stdHours) || 1;
                const dailyRate = s / d;
                const hourlyRate = dailyRate / h;
                return {
                    total: ((parseFloat(otDays) || 0) * dailyRate + (parseFloat(otHours) || 0) * hourlyRate).toFixed(2),
                    daily: dailyRate.toFixed(2), hourly: hourlyRate.toFixed(2)
                };
            }, [salary, stdDays, stdHours, otDays, otHours]);

            return (
                <div className="bg-gray-800 p-6 rounded-xl shadow-md border border-gray-700 fade-in">
                    <div className="flex items-center mb-6">
                        <button onClick={onBack} className="mr-3 text-gray-400 hover:text-blue-400 transition"><i data-lucide="arrow-left"></i></button>
                        <h2 className="text-xl font-bold text-gray-100">Overtime Calculator</h2>
                    </div>
                    <div className="space-y-4">
                        <div className="p-4 bg-gray-900 rounded-lg space-y-3 border border-gray-700">
                            <h3 className="font-bold text-gray-300 text-sm flex items-center gap-2"><i data-lucide="settings-2" size={14}></i> Base Settings</h3>
                            <div>
                                <label className="block text-xs font-semibold text-gray-400 mb-1">Monthly Salary</label>
                                <div className="relative">
                                    <span className="absolute left-3 top-2 text-gray-500">₹</span>
                                    <input type="number" value={salary} onChange={e => setSalary(e.target.value)} className="w-full p-2 pl-7 bg-gray-800 border border-gray-600 text-white rounded outline-none focus:ring-2 focus:ring-purple-500" placeholder="e.g. 15000" />
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <div className="w-1/2"><label className="block text-xs font-semibold text-gray-400 mb-1">Total Days/Mo</label><input type="number" value={stdDays} onChange={e => setStdDays(e.target.value)} className="w-full p-2 bg-gray-800 border border-gray-600 text-white rounded outline-none focus:ring-2 focus:ring-purple-500" /></div>
                                <div className="w-1/2"><label className="block text-xs font-semibold text-gray-400 mb-1">Hours/Day</label><input type="number" value={stdHours} onChange={e => setStdHours(e.target.value)} className="w-full p-2 bg-gray-800 border border-gray-600 text-white rounded outline-none focus:ring-2 focus:ring-purple-500" /></div>
                            </div>
                        </div>
                         <div className="p-4 bg-purple-900/20 rounded-lg space-y-3 border border-purple-800/50">
                            <h3 className="font-bold text-purple-400 text-sm flex items-center gap-2"><i data-lucide="clock" size={14}></i> Additional Work</h3>
                            <div className="flex gap-2">
                                <div className="w-1/2"><label className="block text-xs font-semibold text-purple-400 mb-1">Extra Days</label><input type="number" value={otDays} onChange={e => setOtDays(e.target.value)} className="w-full p-2 bg-gray-800 border border-purple-800/50 text-white rounded outline-none focus:ring-2 focus:ring-purple-500 placeholder-gray-600" placeholder="0" /></div>
                                <div className="w-1/2"><label className="block text-xs font-semibold text-purple-400 mb-1">Extra Hours</label><input type="number" value={otHours} onChange={e => setOtHours(e.target.value)} className="w-full p-2 bg-gray-800 border border-purple-800/50 text-white rounded outline-none focus:ring-2 focus:ring-purple-500 placeholder-gray-600" placeholder="0" /></div>
                            </div>
                        </div>
                        <div className="text-center p-5 bg-gray-950 border border-gray-700 rounded-xl text-white mt-4 shadow-lg">
                            <div className="text-xs text-gray-400 uppercase tracking-wider font-semibold">Total Extra Pay</div>
                            <div className="text-4xl font-bold mt-2 text-green-400">₹ {result.total}</div>
                            <div className="mt-3 pt-3 border-t border-gray-800 flex justify-center gap-4 text-[10px] text-gray-400">
                                <div><span className="block text-gray-500">Daily Rate</span><span className="font-mono text-white">₹{result.daily}</span></div>
                                <div><span className="block text-gray-500">Hourly Rate</span><span className="font-mono text-white">₹{result.hourly}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function LoginScreen({ onUnlock }) {
            const [pin, setPin] = useState('');
            const [error, setError] = useState(false);

            const handleNumberClick = (num) => {
                if (pin.length < 6) {
                    setPin(p => p + num);
                    setError(false);
                }
            };

            const handleClear = () => {
                setPin('');
                setError(false);
            };

            const handleSubmit = () => {
                if (!onUnlock(pin)) {
                    setError(true);
                    setPin('');
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700 w-full max-w-sm flex flex-col items-center text-center">
                        <div className="mb-6 p-4 bg-blue-900/30 rounded-full text-blue-400">
                            <i data-lucide="lock" size={32}></i>
                        </div>
                        <h2 className="text-2xl font-bold text-gray-100 mb-2">Welcome to HouseOS</h2>
                        <p className="text-gray-400 mb-8 text-sm">Enter secure PIN to continue</p>
                        
                        <div className="flex gap-3 mb-8">
                            {[1, 2, 3, 4, 5, 6].map(i => (
                                <div key={i} className={`w-4 h-4 rounded-full border-2 transition-colors ${error ? 'border-red-500 bg-red-500/50' : pin.length >= i ? 'bg-blue-500 border-blue-500' : 'border-gray-600'}`}></div>
                            ))}
                        </div>

                        <div className="grid grid-cols-3 gap-3 w-full">
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                                <button key={num} onClick={() => handleNumberClick(num)} className="h-16 bg-gray-700 rounded-xl text-xl font-bold text-white hover:bg-gray-600 active:scale-95 transition">
                                    {num}
                                </button>
                            ))}
                            <button onClick={handleClear} className="h-16 bg-gray-700 rounded-xl text-sm font-bold uppercase text-gray-400 hover:bg-gray-600 active:scale-95 transition">Clear</button>
                            <button onClick={() => handleNumberClick(0)} className="h-16 bg-gray-700 rounded-xl text-xl font-bold text-white hover:bg-gray-600 active:scale-95 transition">0</button>
                            <button onClick={handleSubmit} className="h-16 bg-blue-600 rounded-xl flex items-center justify-center text-white hover:bg-blue-500 active:scale-95 transition shadow-lg">
                                <i data-lucide="check" size={24}></i>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 3. MAIN APP COMPONENT
        // ==========================================
        function App() {
            const [view, setView] = useState('expenses'); 
            const [loading, setLoading] = useState(true);
            const [refreshTrigger, setRefreshTrigger] = useState(0);
            const [successMsg, setSuccessMsg] = useState('');
            
            const [transactions, setTransactions] = useState([]);
            const [helpers, setHelpers] = useState([]);
            const [taskList, setTaskList] = useState([]); 
            const [budgets, setBudgets] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [income, setIncome] = useState([]); // NEW state for tracking Income records
            
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [authPassword, setAuthPassword] = useState(null);
            
            const [expandedHelpers, setExpandedHelpers] = useState({}); 
            const [historyFilters, setHistoryFilters] = useState({ name: '', action: '' }); 
            const [historyPage, setHistoryPage] = useState(1); 
            
            // Filters for Cashflow History
            const [expenseHistoryFilters, setExpenseHistoryFilters] = useState({ search: '', category: '', month: '', type: 'All' });
            const [expenseHistoryPage, setExpenseHistoryPage] = useState(1);

            const [isTasksExpanded, setIsTasksExpanded] = useState(false); 
            const [transactionToDelete, setTransactionToDelete] = useState(null); 
            
            const [expenseToEdit, setExpenseToEdit] = useState(null);
            const [isReviewModalOpen, setIsReviewModalOpen] = useState(false);
            
            const [budgetFormOpen, setBudgetFormOpen] = useState(false);
            const [budgetForm, setBudgetForm] = useState({ old_category: '', category: '', limit: '' });

            const ITEMS_PER_PAGE = 20;
            const [dashboardDate, setDashboardDate] = useState(new Date());

            const [formData, setFormData] = useState({ type: 'General', name: '', action: 'Expense', amount: '', date: new Date().toISOString().split('T')[0], category: 'Uncategorized', tag: '', notes: '' });
            const [helperForm, setHelperForm] = useState({ name: '', type: 'Monthly', defaultAmount: '' });
            const [taskInput, setTaskInput] = useState('');
            const taskInputRef = useRef(null); 

            useEffect(() => { if (WEB_APP_URL) fetchData(refreshTrigger > 0); }, [refreshTrigger]);
            useEffect(() => { lucide.createIcons(); }); 
            useEffect(() => { setHistoryPage(1); }, [historyFilters]);
            useEffect(() => { setExpenseHistoryPage(1); }, [expenseHistoryFilters]);

            const fetchData = async (silent = false) => {
                if (!silent) setLoading(true);
                try {
                    const response = await fetch(WEB_APP_URL);
                    const data = await response.json();
                    if (data.status === 'success') {
                        setTransactions(data.data.transactions ? data.data.transactions.sort((a, b) => new Date(b.date) - new Date(a.date)) : []);
                        const allHelpers = data.data.helpers || [];
                        const adminHelper = allHelpers.find(h => h.name === '__ADMIN__');
                        setHelpers(allHelpers.filter(h => h.name !== '__ADMIN__'));
                        setTaskList(data.data.shopping || []); 
                        setBudgets(data.data.budgets || []);
                        
                        const loadedExpenses = data.data.expenses ? data.data.expenses.map(e => ({...e, id: e.id || Math.random().toString(36)})).sort((a, b) => new Date(b.date) - new Date(a.date)) : [];
                        setExpenses(loadedExpenses);
                        
                        const loadedIncome = data.data.income ? data.data.income.map(i => ({...i, id: i.id || Math.random().toString(36)})).sort((a, b) => new Date(b.date) - new Date(a.date)) : [];
                        setIncome(loadedIncome);

                        if (adminHelper && adminHelper.amount) {
                            setAuthPassword(adminHelper.amount.toString());
                            checkSession(adminHelper.amount.toString());
                        } else { setIsAuthenticated(true); }
                    }
                } catch (error) { console.error("Error fetching data", error); }
                if (!silent) setLoading(false);
            };

            const setupNotifications = async () => {
                if (!messaging) return;
                try {
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') {
                        const registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
                        const token = await messaging.getToken({ serviceWorkerRegistration: registration }); 
                        if (token) await submitData({ method: 'register_token', token: token }, true);
                    }
                } catch (error) { console.log("Notification setup failed", error); }
            };

            const checkSession = (password) => {
                const session = JSON.parse(localStorage.getItem('houseos_auth_session'));
                if (session && session.token === password && (new Date().getTime() - session.timestamp < 30 * 24 * 60 * 60 * 1000)) {
                    setIsAuthenticated(true); setupNotifications();
                } else { setIsAuthenticated(false); }
            };

            const handleUnlock = (inputPin) => {
                if (inputPin === authPassword) {
                    localStorage.setItem('houseos_auth_session', JSON.stringify({ token: authPassword, timestamp: new Date().getTime() }));
                    setIsAuthenticated(true); setupNotifications();
                    return true;
                } return false;
            };

            const submitData = async (payloadObj, skipRefresh = false) => {
                if (!WEB_APP_URL) return false;
                setSuccessMsg('');
                if (payloadObj.method !== 'add_shopping_item' && payloadObj.method !== 'toggle_shopping_item' && !skipRefresh) { setLoading(true); }
                
                try {
                    const payload = new URLSearchParams(payloadObj);
                    await fetch(WEB_APP_URL, { method: 'POST', body: payload });
                    
                    if (payloadObj.method !== 'add_shopping_item' && payloadObj.method !== 'toggle_shopping_item') {
                        if (!skipRefresh) setRefreshTrigger(prev => prev + 1);
                        setSuccessMsg(payloadObj.method.includes('delete') ? "Deleted successfully! 🗑️" : "Saved successfully! ✅");
                        // Reset forms properly
                        if(payloadObj.method === 'add_transaction' || payloadObj.method === 'add_expense' || payloadObj.method === 'add_income') {
                            setFormData(prev => ({ ...prev, amount: '', notes: '', name: '', category: 'Uncategorized', tag: '' }));
                        }
                    } 
                } catch (error) { 
                    console.error(error); alert("Action failed"); 
                    setLoading(false); return false; 
                }
                
                if (payloadObj.method !== 'add_shopping_item' && payloadObj.method !== 'toggle_shopping_item' && !skipRefresh) { setLoading(false); }
                return true;
            };

            // --- HANDLERS (TRANSACTIONS / HELPERS) ---
            const confirmDelete = async () => {
                if (!transactionToDelete) return;
                const t = transactionToDelete;
                setTransactionToDelete(null);
                setTransactions(prev => prev.filter(tx => tx !== t)); 
                await submitData({ method: 'delete_transaction', date: t.date, name: t.name, action: t.action, amount: t.amount });
            };

            const handleTransactionAction = async (goHome) => {
                if (!formData.name || !formData.amount) { alert("Please complete required fields (Merchant/Source & Amount)."); return; }
                
                if (formData.action === 'Expense') {
                    const success = await submitData({ method: 'add_expense', amount: formData.amount, merchant: formData.name, category: formData.category, date: formData.date }, goHome);
                    if (success && goHome) { await fetchData(false); setView('expenses'); window.scrollTo(0, 0); }
                    return;
                } else if (formData.action === 'Income') {
                    const success = await submitData({ method: 'add_income', amount: formData.amount, source: formData.name, category: formData.category, date: formData.date }, goHome);
                    if (success && goHome) { await fetchData(false); setView('expenses'); window.scrollTo(0, 0); }
                    return;
                }

                const success = await submitData({ ...formData, method: 'add_transaction' }, goHome);
                if (success && goHome) {
                    await fetchData(false);
                    setView('househelp');
                    window.scrollTo(0, 0);
                }
            };

            const handleNameChange = (e) => {
                const val = e.target.value;
                const h = helpers.find(x => x.name === val);
                setFormData(prev => ({
                    ...prev, name: val, 
                    type: h ? h.type : 'General', 
                    action: h ? (h.type === 'Monthly' ? 'Payment/Advance' : 'Payment') : prev.action,
                    amount: h ? (h.amount || '') : prev.amount
                }));
            };

            const handleHelperSubmit = (e) => { 
                e.preventDefault(); if(!helperForm.name) return; 
                submitData({ ...helperForm, method: 'add_helper' }); 
                setHelperForm({ name: '', type: 'Monthly', defaultAmount: '' }); 
            };

            const handleTaskSubmit = (e) => {
                e.preventDefault(); if (!taskInput.trim()) return;
                const tempItem = { date: new Date().toISOString(), item: taskInput, status: 'Open' };
                setTaskList([...taskList, tempItem]); 
                submitData({ method: 'add_shopping_item', item: taskInput });
                setTaskInput('');
                if(taskInputRef.current) taskInputRef.current.focus();
            };

            const toggleTaskItem = (item) => {
                const updatedList = taskList.map(i => (i.item === item.item && i.date === item.date) ? { ...i, status: i.status === 'Open' ? 'Done' : 'Open' } : i );
                setTaskList(updatedList); 
                submitData({ method: 'toggle_shopping_item', item: item.item, date: item.date });
            };

            const handleDeleteTransaction = (t) => {
                setTransactionToDelete(t);
            };

            // --- HANDLERS (EXPENSES & INCOME) ---
            const handleUpdateReviewExpense = (id, field, value) => {
                setExpenses(expenses.map(e => e.id === id ? { ...e, [field]: value } : e));
            };

            const confirmReviewExpense = async (expense) => {
                setExpenses(expenses.map(e => e.id === expense.id ? { ...e, status: 'Confirmed' } : e));
                await submitData({ method: 'update_expense', id: expense.id, amount: expense.amount, merchant: expense.merchant, category: expense.category, status: 'Confirmed' }, true);
            };

            const deleteCashflowItem = async (id, type) => {
                if(window.confirm(`Delete this ${type}?`)) {
                    if (type === 'Expense') {
                        setExpenses(expenses.filter(e => e.id !== id));
                        await submitData({ method: 'delete_expense', id: id }, true);
                    } else {
                        setIncome(income.filter(i => i.id !== id));
                        await submitData({ method: 'delete_income', id: id }, true);
                    }
                }
            };

            const bulkConfirmExpenses = async () => {
                const reviews = expenses.filter(e => e.status === 'Review');
                if (reviews.length === 0) return;
                
                setExpenses(expenses.map(e => e.status === 'Review' ? { ...e, status: 'Confirmed' } : e));
                const ids = reviews.map(e => e.id).join(',');
                await submitData({ method: 'bulk_confirm_expenses', ids: ids }, true);
                setIsReviewModalOpen(false);
            };

            // --- BUDGET MANAGER HANDLERS ---
            const handleSaveBudget = async () => {
                if (!budgetForm.category || !budgetForm.limit) return;
                const method = budgetForm.old_category ? 'update_budget' : 'add_budget';
                
                if (budgetForm.old_category) {
                    setBudgets(budgets.map(b => b.category === budgetForm.old_category ? { category: budgetForm.category, limit: budgetForm.limit } : b));
                } else {
                    setBudgets([...budgets, { category: budgetForm.category, limit: budgetForm.limit }]);
                }

                await submitData({ method, old_category: budgetForm.old_category, category: budgetForm.category, limit: budgetForm.limit }, true);
                setBudgetFormOpen(false);
            };

            const handleDeleteBudget = async (category) => {
                if(window.confirm(`Delete budget category: ${category}?`)) {
                    setBudgets(budgets.filter(b => b.category !== category));
                    await submitData({ method: 'delete_budget', category }, true);
                }
            };

            // --- COMPUTED DATA ---
            const openTasksCount = taskList.filter(i => i.status === 'Open').length;
            const reviewExpensesCount = expenses.filter(e => e.status === 'Review').length;

            const trendData = useMemo(() => {
                const data = [];
                const today = new Date();
                for (let i = 5; i >= 0; i--) {
                    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
                    const m = d.getMonth();
                    const y = d.getFullYear();
                    const label = d.toLocaleString('default', { month: 'short' });
                    
                    let exp = 0;
                    expenses.forEach(e => {
                        if (!e.date || e.status === 'Review') return;
                        const exDate = new Date(e.date);
                        if (exDate.getMonth() === m && exDate.getFullYear() === y) exp += parseFloat(e.amount) || 0;
                    });

                    let inc = 0;
                    income.forEach(i => {
                        if (!i.date || i.status === 'Review') return;
                        const inDate = new Date(i.date);
                        if (inDate.getMonth() === m && inDate.getFullYear() === y) inc += parseFloat(i.amount) || 0;
                    });
                    
                    data.push({ exp, inc, label, dateObj: d });
                }
                const maxVal = Math.max(...data.map(d => Math.max(d.exp, d.inc)), 1); 
                return data.map(d => ({ ...d, expPct: (d.exp/maxVal)*100, incPct: (d.inc/maxVal)*100 }));
            }, [expenses, income]);

            // --- RENDERERS ---
            const renderDeleteModal = () => {
                if (!transactionToDelete) return null;
                return (
                    <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 fade-in">
                        <div className="bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-700 w-full max-w-xs text-center">
                            <div className="mb-4 inline-block p-3 bg-red-900/30 rounded-full text-red-400"><i data-lucide="alert-triangle" size={28}></i></div>
                            <h3 className="text-lg font-bold text-gray-100 mb-2">Delete Record?</h3>
                            <p className="text-sm text-gray-400 mb-6">Are you sure you want to delete this {transactionToDelete.action} of <span className="font-mono text-gray-200">₹{transactionToDelete.amount}</span> for {transactionToDelete.name}?</p>
                            <div className="flex gap-3">
                                <button onClick={() => setTransactionToDelete(null)} className="flex-1 py-2.5 bg-gray-700 text-gray-200 rounded-lg font-medium hover:bg-gray-600 transition">Cancel</button>
                                <button onClick={confirmDelete} className="flex-1 py-2.5 bg-red-600 text-white rounded-lg font-medium hover:bg-red-500 transition shadow-lg">Delete</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderTasks = () => {
                const openItems = taskList.filter(i => i.status === 'Open');

                                                <td className="p-3 whitespace-nowrap align-top text-gray-300">{new Date(t.date).toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: '2-digit' })}</td>
                                                <td className="p-3 align-top"><div className="font-medium text-gray-100 max-w-[100px] truncate" title={t.name}>{t.name}</div>{t.category && (<div className="text-[10px] text-gray-400 mt-1 leading-tight flex items-start gap-1"><span>•</span> {t.category}</div>)}</td>
                                                <td className="p-3 text-xs align-top text-gray-400">{t.action}</td>
                                                <td className={`p-3 text-right font-mono align-top ${amountColor}`}>{amountPrefix}₹{t.amount}</td>
                                                <td className="p-3 text-center align-top"><button onClick={() => handleDeleteTransaction(t)} className="text-gray-500 hover:text-red-400 transition" title="Delete"><i data-lucide="trash-2" size={14}></i></button></td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                        {filteredTransactions.length > ITEMS_PER_PAGE && (
                            <div className="flex justify-between items-center mt-4 pt-4 border-t border-gray-700">
                                <button onClick={() => setHistoryPage(p => Math.max(1, p - 1))} disabled={historyPage === 1} className={`px-3 py-1 rounded text-sm font-medium ${historyPage === 1 ? 'text-gray-600 cursor-not-allowed' : 'text-blue-400 hover:bg-blue-900/50'}`}>Previous</button>
                                <span className="text-xs text-gray-400 font-medium">Page {historyPage} of {totalPages}</span>
                                <button onClick={() => setHistoryPage(p => Math.min(totalPages, p + 1))} disabled={historyPage === totalPages} className={`px-3 py-1 rounded text-sm font-medium ${historyPage === totalPages ? 'text-gray-600 cursor-not-allowed' : 'text-blue-400 hover:bg-blue-900/50'}`}>Next</button>
                            </div>
                        )}
                    </div>
                );
            };

            // --- MAIN RETURN ---
            if (loading && !transactions.length && !helpers.length) return <div className="min-h-screen flex items-center justify-center"><div className="spinner"></div></div>;
            if (!isAuthenticated) return <LoginScreen onUnlock={handleUnlock} />;

            const isRootView = view === 'expenses' || view === 'tasks' || view === 'househelp';

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col text-gray-100 bg-[#111827]">
                    <header className="bg-gray-800 p-4 shadow-md border-b border-gray-700 sticky top-0 z-10 flex justify-between items-center">
                        <div className="text-xl font-bold text-gray-100 flex items-center gap-2 cursor-pointer select-none" onClick={() => { setView('expenses'); setSuccessMsg(''); }}>
                            <i data-lucide="home" className="text-blue-500"></i> HouseOS
                        </div>
                    </header>
                    
                    <main className="flex-1 p-4 relative overflow-y-auto">
                        {loading && (transactions.length > 0 || helpers.length > 0) && (
                            <div className="fixed top-4 right-1/2 translate-x-1/2 z-[60] bg-gray-800/80 p-2 rounded-full shadow-lg backdrop-blur-sm">
                                <div className="spinner w-5 h-5 border-2"></div>
                            </div>
                        )}
                        
                        {view === 'expenses' && renderFinances()}
                        {view === 'budgets' && renderBudgets()}
                        {view === 'cashflow_history' && renderCashflowHistory()}
                        {view === 'tasks' && renderTasks()}
                        {view === 'househelp' && renderHousehelp()}
                        
                        {view === 'add_transaction' && renderTransactionForm()}
                        {view === 'helpers' && renderHelpersManager()}
                        {view === 'history' && renderHistory()}
                        {view === 'calculator' && <Calculator onBack={() => { setView('househelp'); setSuccessMsg(''); }} />}
                        
                        {renderDeleteModal()}

                        {/* Full Screen Review Modal for >3 items */}
                        {isReviewModalOpen && (
                            <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in duration-300">
                                <div className="w-full max-w-md max-h-[85vh] bg-slate-900 rounded-2xl flex flex-col shadow-2xl border border-gray-700 overflow-hidden">
                                    <div className="p-5 border-b border-gray-800 flex justify-between items-center bg-slate-950">
                                        <h2 className="text-lg font-bold text-yellow-500">Review Manager ({expenses.filter(e => e.status === 'Review').length})</h2>
                                        <button onClick={() => setIsReviewModalOpen(false)} className="p-2 bg-gray-800 rounded-full hover:bg-gray-700 transition"><i data-lucide="x" size={16}></i></button>
                                    </div>
                                    
                                    <div className="p-4 border-b border-gray-800 bg-slate-900">
                                        <button onClick={bulkConfirmExpenses} className="w-full bg-green-600 py-3 rounded-xl text-xs font-bold uppercase tracking-wider shadow-lg shadow-green-900/20 hover:bg-green-500 transition">Confirm All Pending</button>
                                    </div>

                                    <div className="flex-1 overflow-y-auto mini-scroll space-y-3 p-4 bg-slate-900">
                                        {expenses.filter(e => e.status === 'Review').map(r => (
                                            <div key={r.id} className="bg-gray-800 border border-gray-700 p-4 rounded-xl space-y-3 shadow-sm">
                                                <div className="flex justify-between items-center gap-3">
                                                    <input type="text" className="bg-gray-900 text-sm text-white border border-gray-600 rounded p-2 flex-1 outline-none focus:border-yellow-500 transition" value={r.merchant} onChange={e => handleUpdateReviewExpense(r.id, 'merchant', e.target.value)} />
                                                    <input type="number" className="bg-gray-900 text-sm text-white border border-gray-600 rounded p-2 w-24 text-right font-mono outline-none focus:border-yellow-500 transition" value={r.amount} onChange={e => handleUpdateReviewExpense(r.id, 'amount', e.target.value)} />
                                                </div>
                                                <div className="flex justify-between items-center gap-3">
                                                    <select className="bg-gray-900 text-xs text-white border border-gray-600 rounded p-2 flex-1 outline-none focus:border-yellow-500 transition" value={r.category} onChange={e => handleUpdateReviewExpense(r.id, 'category', e.target.value)}>
                                                        <option value="Uncategorized">Select Category...</option>
                                                        {budgets.map(b=><option key={b.category} value={b.category}>{b.category}</option>)}
                                                    </select>
                                                </div>
                                                <div className="flex gap-2 pt-2 border-t border-gray-700">
                                                    <button onClick={() => confirmReviewExpense(r)} className="flex-1 bg-green-600/20 text-green-400 py-2 rounded-lg text-xs font-bold uppercase border border-green-600/50 hover:bg-green-600 hover:text-white transition">Confirm</button>
                                                    <button onClick={() => deleteCashflowItem(r.id, 'Expense')} className="flex-1 bg-red-900/20 text-red-400 py-2 rounded-lg text-xs font-bold uppercase border border-red-800/50 hover:bg-red-600 hover:text-white transition">Delete</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Edit Confirmed Cashflow Modal */}
                        {expenseToEdit && (
                            <div className="fixed inset-0 bg-black/80 z-[70] flex items-center justify-center p-4 fade-in">
                                <div className="bg-gray-800 p-5 rounded-xl shadow-2xl border border-gray-700 w-full max-w-sm">
                                    <h3 className="text-lg font-bold text-gray-100 mb-4">Edit {expenseToEdit.type}</h3>
                                    <div className="space-y-3">
                                        <div><label className="text-[10px] text-gray-400 uppercase">{expenseToEdit.type === 'Income' ? 'Source' : 'Merchant'}</label><input type="text" value={expenseToEdit.party} onChange={e=>setExpenseToEdit({...expenseToEdit, party: e.target.value})} className="w-full p-2 bg-gray-700 border border-gray-600 rounded text-white text-sm outline-none focus:border-blue-500"/></div>
                                        <div><label className="text-[10px] text-gray-400 uppercase">Amount</label><input type="number" value={expenseToEdit.amount} onChange={e=>setExpenseToEdit({...expenseToEdit, amount: e.target.value})} className="w-full p-2 bg-gray-700 border border-gray-600 rounded text-white text-sm outline-none focus:border-blue-500"/></div>
                                        <div><label className="text-[10px] text-gray-400 uppercase">Category</label><select value={expenseToEdit.category} onChange={e=>setExpenseToEdit({...expenseToEdit, category: e.target.value})} className="w-full p-2 bg-gray-700 border border-gray-600 rounded text-white text-sm outline-none focus:border-blue-500">
                                            <option value="Uncategorized">Uncategorized</option>
                                            {budgets.map(b=><option key={b.category} value={b.category}>{b.category}</option>)}
                                        </select></div>
                                        <div><label className="text-[10px] text-gray-400 uppercase">Date</label><input type="date" value={expenseToEdit.date ? expenseToEdit.date.split('T')[0] : ''} onChange={e=>setExpenseToEdit({...expenseToEdit, date: e.target.value})} className="w-full p-2 bg-gray-700 border border-gray-600 rounded text-white text-sm outline-none focus:border-blue-500" /></div>
                                    </div>
                                    <div className="flex gap-2 mt-5 pt-4 border-t border-gray-700">
                                        <button onClick={()=>setExpenseToEdit(null)} className="flex-1 p-2 bg-gray-700 rounded font-bold text-gray-300 text-sm hover:bg-gray-600 transition">Cancel</button>
                                        <button onClick={async () => {
                                            const isIncome = expenseToEdit.type === 'Income';
                                            if (isIncome) {
                                                setIncome(income.map(i => i.id === expenseToEdit.id ? { ...expenseToEdit, source: expenseToEdit.party } : i));
                                            } else {
                                                setExpenses(expenses.map(e => e.id === expenseToEdit.id ? { ...expenseToEdit, merchant: expenseToEdit.party } : e));
                                            }
                                            const updatedExp = expenseToEdit;
                                            setExpenseToEdit(null);
                                            
                                            const method = isIncome ? 'update_income' : 'update_expense';
                                            await submitData({ method: method, id: updatedExp.id, amount: updatedExp.amount, [isIncome ? 'source' : 'merchant']: updatedExp.party, category: updatedExp.category, status: updatedExp.status, date: updatedExp.date }, true);
                                        }} className="flex-1 p-2 bg-blue-600 rounded font-bold text-white text-sm hover:bg-blue-500 transition shadow-lg">Save Changes</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* BOTTOM NAVIGATION BAR */}
                    {isRootView && (
                        <nav className="bg-gray-800 border-t border-gray-700 pb-safe sticky bottom-0 z-20 shadow-[0_-4px_10px_rgba(0,0,0,0.3)]">
                            <div className="flex justify-around items-center p-2">
                                <button onClick={() => { setView('expenses'); setSuccessMsg(''); }} className={`flex flex-col items-center p-2 flex-1 relative transition-colors ${view === 'expenses' || view === 'add_expense' ? 'text-blue-400' : 'text-gray-400 hover:text-gray-200'}`}>
                                    <i data-lucide="wallet" size={24}></i>
                                    {expenses.filter(e => e.status === 'Review').length > 0 && <span className="absolute top-1 right-1/4 translate-x-2 -translate-y-1 bg-yellow-500 text-white text-[10px] font-bold h-4 w-4 flex items-center justify-center rounded-full border border-gray-800">{expenses.filter(e => e.status === 'Review').length}</span>}
                                    <span className="text-[10px] mt-1 font-medium">Cashflow</span>
                                </button>
                                <button onClick={() => { setView('tasks'); setSuccessMsg(''); }} className={`flex flex-col items-center p-2 flex-1 relative transition-colors ${view === 'tasks' ? 'text-blue-400' : 'text-gray-400 hover:text-gray-200'}`}>
                                    <i data-lucide="check-square" size={24}></i>
                                    {openTasksCount > 0 && <span className="absolute top-1 right-1/4 translate-x-2 -translate-y-1 bg-blue-500 text-white text-[10px] font-bold h-4 w-4 flex items-center justify-center rounded-full border border-gray-800">{openTasksCount}</span>}
                                    <span className="text-[10px] mt-1 font-medium">Tasks</span>
                                </button>
                                <button onClick={() => { setView('househelp'); setSuccessMsg(''); }} className={`flex flex-col items-center p-2 flex-1 transition-colors ${view === 'househelp' ? 'text-purple-400' : 'text-gray-400 hover:text-gray-200'}`}>
                                    <i data-lucide="users" size={24}></i>
                                    <span className="text-[10px] mt-1 font-medium">Househelp</span>
                                </button>
                            </div>
                        </nav>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
