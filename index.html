<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow"> <!-- Prevents crawling -->
    
    <!-- iOS Web App Configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HouseHelp">

    <!-- Browser Title & Favicon -->
    <title>HouseHelp Manager</title>
    <!-- Standard Favicon -->
    <link rel="icon" type="image/png" href="icon.png">
    <!-- iPhone/iPad Home Screen Icon -->
    <link rel="apple-touch-icon" href="icon.png">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            color-scheme: dark;
        }
        body { 
            background-color: #111827; /* gray-900 */
            color: #f3f4f6; /* gray-100 */
        }
        .spinner {
            border: 3px solid #374151; /* gray-700 */
            border-top: 3px solid #3b82f6; /* blue-500 */
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .strike-through { text-decoration: line-through; color: #6b7280; /* gray-500 */ }
        
        /* Custom Scrollbar for mini-ledger */
        .mini-scroll::-webkit-scrollbar { width: 4px; }
        .mini-scroll::-webkit-scrollbar-track { background: transparent; }
        .mini-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- CONFIGURATION ---
        // PASTE YOUR GOOGLE SCRIPT WEB APP URL INSIDE THE QUOTES BELOW
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbytkALz5wXHB9pMfbSOTqYtKLV6yp5H5wp3QdDupQF89uggt_HiYMbrOXP5ubw52_i0/exec"; 
        
        const { useState, useEffect, useMemo, useRef } = React;

        // --- SUB-COMPONENT: OVERTIME CALCULATOR ---
        function Calculator({ onBack }) {
            const [salary, setSalary] = useState('');
            const [stdDays, setStdDays] = useState('30');
            const [stdHours, setStdHours] = useState('8');
            const [otDays, setOtDays] = useState('');
            const [otHours, setOtHours] = useState('');

            const result = useMemo(() => {
                const s = parseFloat(salary) || 0;
                const d = parseFloat(stdDays) || 1;
                const h = parseFloat(stdHours) || 1;
                
                const dailyRate = s / d;
                const hourlyRate = dailyRate / h;
                
                const extraDayPay = (parseFloat(otDays) || 0) * dailyRate;
                const extraHourPay = (parseFloat(otHours) || 0) * hourlyRate;
                
                return {
                    total: (extraDayPay + extraHourPay).toFixed(2),
                    daily: dailyRate.toFixed(2),
                    hourly: hourlyRate.toFixed(2)
                };
            }, [salary, stdDays, stdHours, otDays, otHours]);

            return (
                <div className="bg-gray-800 p-6 rounded-xl shadow-md border border-gray-700 fade-in">
                    <div className="flex items-center mb-6">
                        <button onClick={onBack} className="mr-3 text-gray-400 hover:text-blue-400 transition">
                            <i data-lucide="arrow-left"></i>
                        </button>
                        <h2 className="text-xl font-bold text-gray-100">Overtime Calculator</h2>
                    </div>
                    <div className="space-y-4">
                        <div className="p-4 bg-gray-900 rounded-lg space-y-3 border border-gray-700">
                            <h3 className="font-bold text-gray-300 text-sm flex items-center gap-2"><i data-lucide="settings-2" size={14}></i> Base Settings</h3>
                            <div>
                                <label className="block text-xs font-semibold text-gray-400 mb-1">Monthly Salary</label>
                                <div className="relative">
                                    <span className="absolute left-3 top-2 text-gray-500">₹</span>
                                    <input type="number" value={salary} onChange={e => setSalary(e.target.value)} className="w-full p-2 pl-7 bg-gray-800 border border-gray-600 text-white rounded focus:ring-2 focus:ring-blue-500 outline-none placeholder-gray-500" placeholder="e.g. 15000" />
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <div className="w-1/2"><label className="block text-xs font-semibold text-gray-400 mb-1">Total Days/Mo</label><input type="number" value={stdDays} onChange={e => setStdDays(e.target.value)} className="w-full p-2 bg-gray-800 border border-gray-600 text-white rounded focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                                <div className="w-1/2"><label className="block text-xs font-semibold text-gray-400 mb-1">Hours/Day</label><input type="number" value={stdHours} onChange={e => setStdHours(e.target.value)} className="w-full p-2 bg-gray-800 border border-gray-600 text-white rounded focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                            </div>
                        </div>
                         <div className="p-4 bg-blue-900/20 rounded-lg space-y-3 border border-blue-800/50">
                            <h3 className="font-bold text-blue-400 text-sm flex items-center gap-2"><i data-lucide="clock" size={14}></i> Additional Work</h3>
                            <div className="flex gap-2">
                                <div className="w-1/2"><label className="block text-xs font-semibold text-blue-400 mb-1">Extra Days</label><input type="number" value={otDays} onChange={e => setOtDays(e.target.value)} className="w-full p-2 bg-gray-800 border border-blue-800/50 text-white rounded focus:ring-2 focus:ring-blue-500 outline-none placeholder-gray-600" placeholder="0" /></div>
                                <div className="w-1/2"><label className="block text-xs font-semibold text-blue-400 mb-1">Extra Hours</label><input type="number" value={otHours} onChange={e => setOtHours(e.target.value)} className="w-full p-2 bg-gray-800 border border-blue-800/50 text-white rounded focus:ring-2 focus:ring-blue-500 outline-none placeholder-gray-600" placeholder="0" /></div>
                            </div>
                        </div>
                        <div className="text-center p-5 bg-gray-950 border border-gray-700 rounded-xl text-white mt-4 shadow-lg">
                            <div className="text-xs text-gray-400 uppercase tracking-wider font-semibold">Total Extra Pay</div>
                            <div className="text-4xl font-bold mt-2 text-green-400">₹ {result.total}</div>
                            <div className="mt-3 pt-3 border-t border-gray-800 flex justify-center gap-4 text-[10px] text-gray-400">
                                <div>
                                    <span className="block text-gray-500">Daily Rate</span>
                                    <span className="font-mono text-white">₹{result.daily}</span>
                                </div>
                                <div>
                                    <span className="block text-gray-500">Hourly Rate</span>
                                    <span className="font-mono text-white">₹{result.hourly}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- SUB-COMPONENT: LOGIN SCREEN ---
        function LoginScreen({ onUnlock }) {
            const [pin, setPin] = useState('');
            const [error, setError] = useState(false);
            const handleSubmit = (e) => {
                e.preventDefault();
                if (!onUnlock(pin)) { setError(true); setPin(''); }
            };
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700 w-full max-w-sm text-center">
                        <div className="mb-6 inline-block p-4 bg-blue-900/30 rounded-full text-blue-400"><i data-lucide="lock" size={32}></i></div>
                        <h2 className="text-2xl font-bold text-gray-100 mb-2">Welcome Back</h2>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input type="password" value={pin} onChange={e => { setPin(e.target.value); setError(false); }} className={`w-full p-3 bg-gray-700 text-white placeholder-gray-500 text-center text-lg tracking-widest border rounded-xl outline-none focus:ring-2 ${error ? 'border-red-500 focus:ring-red-400' : 'border-gray-600 focus:ring-blue-500'}`} placeholder="• • • •" autoFocus />
                            <button type="submit" className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg hover:bg-blue-500 transition">Unlock App</button>
                        </form>
                    </div>
                </div>
            );
        }

        // --- MAIN APP COMPONENT ---
        function App() {
            // --- STATE ---
            const [view, setView] = useState('dashboard'); 
            const [loading, setLoading] = useState(true);
            const [transactions, setTransactions] = useState([]);
            const [helpers, setHelpers] = useState([]);
            const [taskList, setTaskList] = useState([]); // Task List State
            const [refreshTrigger, setRefreshTrigger] = useState(0);
            const [successMsg, setSuccessMsg] = useState('');
            
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [authPassword, setAuthPassword] = useState(null);
            
            const [expandedHelpers, setExpandedHelpers] = useState({}); 
            const [historyFilters, setHistoryFilters] = useState({ name: '', action: '' }); 
            const [historyPage, setHistoryPage] = useState(1); 
            const [isTasksExpanded, setIsTasksExpanded] = useState(false); // Collapsed completed items
            const [transactionToDelete, setTransactionToDelete] = useState(null); // Track item to delete
            const ITEMS_PER_PAGE = 20;
            const [dashboardDate, setDashboardDate] = useState(new Date());

            // Transaction Form
            const [formData, setFormData] = useState({ type: 'Monthly', name: '', action: 'Payment/Advance', amount: '', date: new Date().toISOString().split('T')[0], notes: '' });
            // Helper Form
            const [helperForm, setHelperForm] = useState({ name: '', type: 'Monthly', defaultAmount: '' });
            // Task Form
            const [taskInput, setTaskInput] = useState('');
            const shoppingInputRef = useRef(null); // Ref for input focus

            // --- EFFECTS ---
            useEffect(() => { if (WEB_APP_URL) fetchData(refreshTrigger > 0); }, [refreshTrigger]);
            useEffect(() => { lucide.createIcons(); }, [view, transactions, helpers, taskList, isTasksExpanded, expandedHelpers, transactionToDelete]);
            useEffect(() => { setSuccessMsg(''); }, [view]);
            useEffect(() => { setHistoryPage(1); }, [historyFilters]);

            // --- API ACTIONS ---
            const fetchData = async (silent = false) => {
                if (!silent) setLoading(true);
                try {
                    const response = await fetch(WEB_APP_URL);
                    const data = await response.json();
                    if (data.status === 'success') {
                        setTransactions(data.data.transactions.sort((a, b) => new Date(b.date) - new Date(a.date)));
                        const allHelpers = data.data.helpers || [];
                        const adminHelper = allHelpers.find(h => h.name === '__ADMIN__');
                        setHelpers(allHelpers.filter(h => h.name !== '__ADMIN__'));
                        setTaskList(data.data.shopping || []); 

                        if (adminHelper && adminHelper.amount) {
                            setAuthPassword(adminHelper.amount.toString());
                            checkSession(adminHelper.amount.toString());
                        } else { setIsAuthenticated(true); }
                    }
                } catch (error) { console.error("Error fetching data", error); }
                if (!silent) setLoading(false);
            };

            const checkSession = (password) => {
                const session = JSON.parse(localStorage.getItem('househelp_auth_session'));
                if (session && session.token === password && (new Date().getTime() - session.timestamp < 30 * 24 * 60 * 60 * 1000)) {
                    setIsAuthenticated(true);
                } else { setIsAuthenticated(false); }
            };

            const handleUnlock = (inputPin) => {
                if (inputPin === authPassword) {
                    localStorage.setItem('househelp_auth_session', JSON.stringify({ token: authPassword, timestamp: new Date().getTime() }));
                    setIsAuthenticated(true);
                    return true;
                }
                return false;
            };

            const submitData = async (payloadObj) => {
                if (!WEB_APP_URL) return false;
                
                // Clear success message on new submission
                setSuccessMsg('');

                // Do not show global loading spinner for task actions
                if (payloadObj.method !== 'add_shopping_item' && payloadObj.method !== 'toggle_shopping_item') {
                    setLoading(true);
                }
                
                try {
                    const payload = new URLSearchParams(payloadObj);
                    await fetch(WEB_APP_URL, { method: 'POST', body: payload });
                    
                    if (payloadObj.method !== 'add_shopping_item' && payloadObj.method !== 'toggle_shopping_item') {
                        setRefreshTrigger(prev => prev + 1);
                        setSuccessMsg(payloadObj.method === 'delete_transaction' ? "Deleted successfully! 🗑️" : "Saved successfully! ✅");
                        if(payloadObj.method === 'add_transaction') setFormData(prev => ({ ...prev, amount: '', notes: '' }));
                    } 
                } catch (error) { 
                    console.error(error); 
                    alert("Action failed"); 
                    setLoading(false); 
                    return false; 
                }
                
                if (payloadObj.method !== 'add_shopping_item' && payloadObj.method !== 'toggle_shopping_item') {
                    setLoading(false);
                }
                return true;
            };

            // --- HANDLERS ---
            const handleDeleteTransaction = (t) => {
                setTransactionToDelete(t);
            };

            const confirmDelete = async () => {
                if (!transactionToDelete) return;
                const t = transactionToDelete;
                setTransactionToDelete(null); // Hide modal immediately

                // Optimistic UI update
                setTransactions(prev => prev.filter(tx => tx !== t));
                await submitData({ 
                    method: 'delete_transaction', 
                    date: t.date, 
                    name: t.name, 
                    action: t.action, 
                    amount: t.amount 
                });
            };

            const handleTransactionAction = async (goHome) => {
                if (!formData.name || !formData.amount) {
                    alert("Please complete the required fields (Helper, Amount).");
                    return;
                }
                const success = await submitData({ ...formData, method: 'add_transaction' });
                if (success && goHome) {
                    setView('dashboard');
                    setSuccessMsg(''); // Clear success message from screen when going home
                    window.scrollTo(0, 0);
                }
            };

            const handleHelperSubmit = (e) => { e.preventDefault(); if(!helperForm.name) return; submitData({ ...helperForm, method: 'add_helper' }); setHelperForm({ name: '', type: 'Monthly', defaultAmount: '' }); setView('helpers'); };
            const handleHelperSelect = (e) => { 
                const h = helpers.find(h => h.name === e.target.value);
                setFormData(prev => ({ ...prev, name: e.target.value, type: h ? h.type : prev.type, amount: h ? (h.amount || '') : prev.amount })); 
            };
            
            // Task Handlers (Backend uses "shopping" mapping to keep scripts untouched)
            const handleTaskSubmit = (e) => {
                e.preventDefault();
                if (!taskInput.trim()) return;
                
                const tempItem = { date: new Date().toISOString(), item: taskInput, status: 'Open' };
                setTaskList([...taskList, tempItem]); // Optimistic Add
                
                submitData({ method: 'add_shopping_item', item: taskInput });
                setTaskInput('');
                // Keep focus
                if(taskInputRef.current) taskInputRef.current.focus();
            };

            const toggleTaskItem = (item) => {
                const updatedList = taskList.map(i => 
                    (i.item === item.item && i.date === item.date) ? { ...i, status: i.status === 'Open' ? 'Done' : 'Open' } : i
                );
                setTaskList(updatedList); // Optimistic Toggle
                
                submitData({ method: 'toggle_shopping_item', item: item.item, date: item.date });
            };

            // Calculate Task Count
            const openTasksCount = taskList.filter(i => i.status === 'Open').length;

            // --- RENDERERS ---
            const renderDeleteModal = () => {
                if (!transactionToDelete) return null;
                return (
                    <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 fade-in">
                        <div className="bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-700 w-full max-w-xs text-center">
                            <div className="mb-4 inline-block p-3 bg-red-900/30 rounded-full text-red-400">
                                <i data-lucide="alert-triangle" size={28}></i>
                            </div>
                            <h3 className="text-lg font-bold text-gray-100 mb-2">Delete Record?</h3>
                            <p className="text-sm text-gray-400 mb-6">
                                Are you sure you want to delete this {transactionToDelete.action} of <span className="font-mono text-gray-200">₹{transactionToDelete.amount}</span> for {transactionToDelete.name}? This cannot be undone.
                            </p>
                            <div className="flex gap-3">
                                <button onClick={() => setTransactionToDelete(null)} className="flex-1 py-2.5 bg-gray-700 text-gray-200 rounded-lg font-medium hover:bg-gray-600 transition">Cancel</button>
                                <button onClick={confirmDelete} className="flex-1 py-2.5 bg-red-600 text-white rounded-lg font-medium hover:bg-red-500 transition shadow-lg">Delete</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderTasks = () => {
                const openItems = taskList.filter(i => i.status === 'Open');
                const doneItems = taskList.filter(i => i.status === 'Done');

                return (
                    <div className="bg-gray-800 p-6 rounded-xl shadow-md border border-gray-700 fade-in min-h-[500px]">
                        <div className="flex items-center mb-6">
                            <button onClick={() => setView('dashboard')} className="mr-3 text-gray-400 hover:text-blue-400"><i data-lucide="arrow-left"></i></button>
                            <h2 className="text-xl font-bold text-gray-100">Task List</h2>
                        </div>

                        {/* Add Item */}
                        <form onSubmit={handleTaskSubmit} className="mb-6 relative">
                            <input 
                                ref={taskInputRef}
                                type="text" 
                                className="w-full p-4 pr-12 bg-gray-700 border border-gray-600 text-white placeholder-gray-400 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none shadow-sm"
                                placeholder="Add task..."
                                value={taskInput}
                                onChange={e => setTaskInput(e.target.value)}
                                autoFocus
                            />
                            <button type="submit" className="absolute right-3 top-3 p-1 text-blue-400 bg-blue-500/20 rounded-full hover:bg-blue-500/30 transition">
                                <i data-lucide="plus" size={24}></i>
                            </button>
                        </form>

                        {/* Open Items */}
                        <div className="space-y-2 mb-6">
                            {openItems.length === 0 && <p className="text-center text-gray-500 py-4 italic">All tasks completed! 🎉</p>}
                            {openItems.map((item, idx) => (
                                <div key={idx} onClick={() => toggleTaskItem(item)} className="flex items-center p-3 bg-gray-800 border border-gray-700 rounded-lg shadow-sm cursor-pointer hover:bg-gray-700 transition select-none group">
                                    <div className="w-5 h-5 rounded border-2 border-gray-500 mr-3 group-hover:border-blue-400"></div>
                                    <span className="text-gray-200 font-medium">{item.item}</span>
                                </div>
                            ))}
                        </div>

                        {/* Completed Items */}
                        {doneItems.length > 0 && (
                            <div className="border-t border-gray-700 pt-4">
                                <button 
                                    onClick={() => setIsTasksExpanded(!isTasksExpanded)}
                                    className="flex items-center text-gray-400 text-sm font-bold mb-3 hover:text-gray-300 transition"
                                >
                                    <i data-lucide={isTasksExpanded ? "chevron-down" : "chevron-right"} size={16} className="mr-1"></i>
                                    Completed ({doneItems.length})
                                </button>
                                
                                {isTasksExpanded && (
                                    <div className="space-y-2 fade-in">
                                        {doneItems.map((item, idx) => (
                                            <div key={idx} onClick={() => toggleTaskItem(item)} className="flex items-center p-2 opacity-60 cursor-pointer hover:opacity-100 transition">
                                                <div className="w-5 h-5 rounded bg-green-900/30 border border-green-700 mr-3 flex items-center justify-center text-green-400">
                                                    <i data-lucide="check" size={12}></i>
                                                </div>
                                                <span className="text-gray-400 line-through decoration-gray-500">{item.item}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                );
            };

            const renderDashboard = () => {
                const currentMonthValue = `${dashboardDate.getFullYear()}-${String(dashboardDate.getMonth() + 1).padStart(2, '0')}`;
                
                // Helper Stats Calculation with specific month transactions included
                const helperStats = helpers.map(helper => {
                    const myTx = transactions.filter(t => t.name === helper.name);
                    const thisMonthTx = myTx.filter(t => { 
                        const d = new Date(t.date); 
                        return d.getMonth() === dashboardDate.getMonth() && d.getFullYear() === dashboardDate.getFullYear(); 
                    });
                    
                    let due = 0, paid = 0;
                    if (helper.type === 'Monthly') {
                        due = thisMonthTx.filter(t => t.action === 'Salary Due').reduce((a, c) => a + parseFloat(c.amount||0), 0);
                        paid = thisMonthTx.filter(t => t.action === 'Payment/Advance').reduce((a, c) => a + parseFloat(c.amount||0), 0);
                    } else {
                        due = thisMonthTx.filter(t => t.action === 'Work Logged').reduce((a, c) => a + parseFloat(c.amount||0), 0);
                        paid = thisMonthTx.filter(t => t.action === 'Payment').reduce((a, c) => a + parseFloat(c.amount||0), 0);
                    }
                    
                    const totalDue = myTx.filter(t => t.action === 'Salary Due' || t.action === 'Work Logged').reduce((a, c) => a + parseFloat(c.amount||0), 0);
                    const totalPaid = myTx.filter(t => t.action === 'Payment/Advance' || t.action === 'Payment').reduce((a, c) => a + parseFloat(c.amount||0), 0);
                    
                    return { 
                        ...helper, 
                        monthDue: due, 
                        monthPaid: paid, 
                        overallBalance: totalDue - totalPaid, 
                        totalPaidAllTime: totalPaid,
                        thisMonthTx // Includes exact records to render history snippet
                    };
                });
                
                const grandTotalPaid = helperStats.reduce((acc, curr) => acc + curr.totalPaidAllTime, 0);

                return (
                    <div className="space-y-4 fade-in">
                        {!WEB_APP_URL && <div className="bg-red-900/30 p-4 rounded-xl border border-red-800 text-red-400 text-sm mb-4"><strong>Config Needed:</strong> Paste URL in code.</div>}
                        
                        <div className="flex justify-between items-center mb-2">
                            <h2 className="text-xl font-bold text-gray-100">Dashboard</h2>
                            <input type="month" value={currentMonthValue} onChange={e => { if(e.target.value) { const [y,m] = e.target.value.split('-'); setDashboardDate(new Date(parseInt(y), parseInt(m)-1, 1)); }}} className="bg-gray-700 border border-gray-600 text-white text-sm font-bold rounded-lg p-2 shadow-sm" />
                        </div>

                        {/* Prominent Task Button */}
                        <button 
                            onClick={() => setView('tasks')}
                            className="w-full bg-blue-900/30 border border-blue-800/50 hover:bg-blue-800/40 p-4 rounded-xl shadow-sm flex items-center justify-between transition-colors mb-2 group"
                        >
                            <div className="flex items-center gap-4">
                                <div className="bg-blue-500/20 text-blue-400 p-2 rounded-lg group-hover:scale-110 transition-transform">
                                    <i data-lucide="check-square" size={24}></i>
                                </div>
                                <div className="text-left">
                                    <div className="font-bold text-lg text-blue-100 leading-tight">Tasks</div>
                                    <div className="text-xs font-medium text-blue-400">{openTasksCount} pending {openTasksCount === 1 ? 'task' : 'tasks'}</div>
                                </div>
                            </div>
                            <i data-lucide="chevron-right" size={20} className="text-gray-500 group-hover:text-blue-400 transition-colors"></i>
                        </button>

                        {/* Helpers Cards */}
                        <div className="space-y-3">
                            {!loading && helpers.length === 0 && <div className="text-center p-6 bg-gray-800 rounded-xl border border-dashed border-gray-600"><p className="text-gray-400 mb-2">No helpers.</p><button onClick={() => setView('helpers')} className="text-blue-400 font-bold">Add Helper</button></div>}
                            {helperStats.map((h, i) => {
                                const isExpanded = !!expandedHelpers[h.name];
                                return (
                                    <div key={i} className="bg-gray-800 rounded-xl shadow-md border border-gray-700 overflow-hidden transition-all duration-200">
                                        <div className="p-5 flex justify-between items-start cursor-pointer hover:bg-gray-700 transition-colors" onClick={() => setExpandedHelpers(prev => ({...prev, [h.name]: !prev[h.name]}))}>
                                            <div className="flex items-start gap-3">
                                                 <div className={`mt-1 text-gray-400 transition-transform ${isExpanded ? 'rotate-180' : ''}`}><i data-lucide="chevron-down" size={20}></i></div>
                                                <div><h3 className="font-bold text-lg text-gray-100">{h.name}</h3><span className="text-xs bg-gray-700 text-gray-300 px-2 py-0.5 rounded">{h.type}</span></div>
                                            </div>
                                            <div className="text-right">
                                                <div className={`text-xl font-bold ${h.overallBalance > 0 ? 'text-red-400' : 'text-green-400'}`}>{h.overallBalance > 0 ? `-${h.overallBalance}` : `+${Math.abs(h.overallBalance)}`}</div>
                                                <div className="text-[10px] text-gray-400 uppercase tracking-wide">Net Balance</div>
                                            </div>
                                        </div>
                                        {isExpanded && (
                                            <div className="px-5 pb-5 pt-0 border-t border-gray-700 animate-fade-in-down">
                                                <div className="h-4"></div>
                                                
                                                {/* Action Buttons Moved to Top */}
                                                <div className="flex gap-2 mb-4">
                                                     <button onClick={(e) => { e.stopPropagation(); setFormData({ ...formData, name: h.name, type: h.type, action: h.type === 'Monthly' ? 'Payment/Advance' : 'Payment', amount: h.amount || '' }); setView('add_transaction'); }} className="flex-1 py-3 bg-blue-600 text-white text-xs font-bold rounded-lg hover:bg-blue-500 shadow-sm transition">Pay</button>
                                                    <button onClick={(e) => { e.stopPropagation(); setFormData({ ...formData, name: h.name, type: h.type, action: h.type === 'Monthly' ? 'Salary Due' : 'Work Logged', amount: h.amount || '' }); setView('add_transaction'); }} className="flex-1 py-3 bg-gray-700 text-gray-200 text-xs font-bold rounded-lg hover:bg-gray-600 transition shadow-sm border border-gray-600">{h.type === 'Monthly' ? 'Add Due' : 'Log Work'}</button>
                                                </div>
                                                
                                                {/* Monthly Ledger History Mini-View */}
                                                {h.thisMonthTx && h.thisMonthTx.length > 0 && (
                                                    <div className="mb-3 bg-gray-900 rounded-lg p-2 border border-gray-700 shadow-inner">
                                                        <div className="text-[10px] text-gray-500 uppercase tracking-wide mb-1 font-semibold px-2 flex justify-between">
                                                            <span className="w-12">Date</span>
                                                            <span className="flex-1">Action</span>
                                                            <span className="w-16 text-right">Amount</span>
                                                        </div>
                                                        <div className="space-y-1 max-h-40 overflow-y-auto pr-1 mini-scroll">
                                                            {h.thisMonthTx.sort((a,b) => new Date(b.date) - new Date(a.date)).map((tx, idx) => (
                                                                <div key={idx} className="flex justify-between items-center text-xs p-1.5 hover:bg-gray-800 rounded text-gray-300">
                                                                    <span className="w-12 text-gray-500">{new Date(tx.date).toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit' })}</span>
                                                                    <span className="flex-1 truncate px-2">{tx.action}</span>
                                                                    <span className="font-mono text-gray-100 text-right w-16">{tx.amount}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}

                                                {/* Summary Moved to Bottom & Styled as Read-Only */}
                                                <div className="bg-gray-900/50 p-3 rounded-lg flex justify-between items-center text-sm border border-gray-800 cursor-default select-none">
                                                    <div><div className="text-gray-500 text-[10px] uppercase tracking-wider mb-0.5">Due ({dashboardDate.toLocaleString('default', { month: 'short' })})</div><div className="font-semibold text-gray-400">₹{h.monthDue}</div></div>
                                                    <div className="text-gray-700">|</div>
                                                    <div className="text-right"><div className="text-gray-500 text-[10px] uppercase tracking-wider mb-0.5">Paid ({dashboardDate.toLocaleString('default', { month: 'short' })})</div><div className="font-semibold text-gray-400">₹{h.monthPaid}</div></div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        <div className="bg-gradient-to-r from-blue-600 to-blue-800 p-6 rounded-xl shadow-lg text-white mb-6">
                            <h3 className="text-blue-200 text-sm font-medium mb-1">Total Paid (Lifetime)</h3>
                            <div className="text-3xl font-bold mb-4">{grandTotalPaid.toLocaleString()}</div>
                            {helperStats.length > 0 && <div className="space-y-2 pt-3 border-t border-blue-500/30"><h4 className="text-[10px] font-bold text-blue-200 uppercase tracking-wide">Breakdown by Helper</h4>{helperStats.map((h, i) => (<div key={i} className="flex justify-between items-center text-sm"><span>{h.name}</span><span className="font-mono font-medium opacity-90">{h.totalPaidAllTime.toLocaleString()}</span></div>))}</div>}
                        </div>

                         <div className="grid grid-cols-2 gap-3 mt-4">
                             <button onClick={() => setView('helpers')} className="bg-gray-800 p-3 rounded-xl shadow-sm border border-gray-700 flex items-center justify-center gap-2 hover:bg-gray-700 text-sm font-medium text-gray-200"><i data-lucide="users" size={16}></i> Helpers</button>
                             <button onClick={() => setView('history')} className="bg-gray-800 p-3 rounded-xl shadow-sm border border-gray-700 flex items-center justify-center gap-2 hover:bg-gray-700 text-sm font-medium text-gray-200"><i data-lucide="history" size={16}></i> History</button>
                             <button onClick={() => setView('calculator')} className="col-span-2 bg-gray-800 p-3 rounded-xl shadow-sm border border-gray-700 flex items-center justify-center gap-2 hover:bg-gray-700 text-sm font-medium text-gray-200"><i data-lucide="calculator" size={16}></i> Overtime</button>
                        </div>
                    </div>
                );
            };

            const renderTransactionForm = () => (
                <div className="bg-gray-800 p-6 rounded-xl shadow-md border border-gray-700 fade-in">
                    <div className="flex items-center mb-6"><button onClick={() => setView('dashboard')} className="mr-3 text-gray-400 hover:text-blue-400"><i data-lucide="arrow-left"></i></button><h2 className="text-xl font-bold text-gray-100">Transaction</h2></div>
                    <form className="space-y-4">
                        <div><label className="block text-sm font-medium text-gray-300 mb-1">Helper</label><select className="w-full p-3 bg-gray-700 border border-gray-600 text-white rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={formData.name} onChange={handleHelperSelect}><option value="">-- Select --</option>{helpers.map((h, i) => <option key={i} value={h.name}>{h.name}</option>)}</select></div>
                        <div><label className="block text-sm font-medium text-gray-300 mb-1">Action</label><select className="w-full p-3 bg-gray-700 border border-gray-600 text-white rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={formData.action} onChange={e => setFormData({...formData, action: e.target.value})}>{formData.type === 'Monthly' ? (<><option value="Payment/Advance">Payment / Advance</option><option value="Salary Due">Salary Due</option></>) : (<><option value="Work Logged">Log Work Week</option><option value="Payment">Payment</option></>)}</select></div>
                        <div><label className="block text-sm font-medium text-gray-300 mb-1">Amount</label><input type="number" className="w-full p-3 bg-gray-700 border border-gray-600 text-white placeholder-gray-400 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} placeholder="0.00" /></div>
                        <div><label className="block text-sm font-medium text-gray-300 mb-1">Date</label><input type="date" className="w-full p-3 bg-gray-700 border border-gray-600 text-white rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} /></div>
                        <div><label className="block text-sm font-medium text-gray-300 mb-1">Notes</label><input type="text" className="w-full p-3 bg-gray-700 border border-gray-600 text-white placeholder-gray-400 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} placeholder="Optional" /></div>
                        
                        <div className="flex gap-3 pt-2">
                            <button type="button" onClick={() => handleTransactionAction(false)} disabled={loading} className="w-1/2 py-3 bg-gray-700 text-gray-200 border border-gray-600 rounded-xl font-bold hover:bg-gray-600 transition shadow-sm">
                                {loading ? 'Saving...' : 'Save'}
                            </button>
                            <button type="button" onClick={() => handleTransactionAction(true)} disabled={loading} className="w-1/2 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-500 transition shadow-lg">
                                {loading ? 'Saving...' : 'Save & Home'}
                            </button>
                        </div>

                        {successMsg && <div className="mt-2 text-green-400 text-sm font-bold text-center bg-green-900/30 border border-green-800 p-2 rounded">{successMsg}</div>}
                    </form>
                </div>
            );

            const renderHelpersManager = () => (
                <div className="bg-gray-800 p-6 rounded-xl shadow-md border border-gray-700 fade-in">
                    <div className="flex items-center mb-6"><button onClick={() => setView('dashboard')} className="mr-3 text-gray-400 hover:text-blue-400"><i data-lucide="arrow-left"></i></button><h2 className="text-xl font-bold text-gray-100">Manage Helpers</h2></div>
                    <form onSubmit={handleHelperSubmit} className="bg-gray-900 p-4 rounded-lg border border-gray-700 mb-6 space-y-3">
                        <input type="text" placeholder="Name" className="w-full p-2 bg-gray-700 border border-gray-600 text-white placeholder-gray-400 rounded outline-none focus:ring-2 focus:ring-blue-500" value={helperForm.name} onChange={e => setHelperForm({...helperForm, name: e.target.value})} />
                        <div className="flex gap-2">
                            <select className="w-1/2 p-2 bg-gray-700 border border-gray-600 text-white rounded outline-none focus:ring-2 focus:ring-blue-500" value={helperForm.type} onChange={e => setHelperForm({...helperForm, type: e.target.value})}><option value="Monthly">Monthly</option><option value="Weekly">Weekly</option></select>
                            <input type="number" placeholder="Current Salary" className="w-1/2 p-2 bg-gray-700 border border-gray-600 text-white placeholder-gray-400 rounded outline-none focus:ring-2 focus:ring-blue-500" value={helperForm.defaultAmount} onChange={e => setHelperForm({...helperForm, defaultAmount: e.target.value})} />
                        </div>
                        <p className="text-[10px] text-gray-300 bg-blue-900/30 p-2 rounded border border-blue-800"><i className="inline-block mr-1">ℹ️</i> Updating the rate here only affects <strong>new</strong> future transactions. Past records will remain unchanged.</p>
                        <button type="submit" disabled={loading} className="w-full bg-green-600 text-white p-2 rounded font-medium hover:bg-green-500">{helpers.find(h => h.name === helperForm.name) ? 'Update Helper' : 'Save New Helper'}</button>
                        {successMsg && <div className="mt-2 text-green-400 text-sm font-bold text-center bg-green-900/30 border border-green-800 p-2 rounded">{successMsg}</div>}
                    </form>
                    <div className="space-y-2">{helpers.map((h, i) => (<div key={i} className="flex justify-between items-center bg-gray-800 border border-gray-700 p-3 rounded shadow-sm"><div><div className="font-bold text-gray-100">{h.name}</div><div className="text-xs text-gray-400">{h.type} • {h.amount || 0}</div></div><button onClick={() => setHelperForm({name: h.name, type: h.type, defaultAmount: h.amount})} className="text-blue-400 hover:text-blue-300 text-xs">Edit</button></div>))}</div>
                </div>
            );

            const renderHistory = () => {
                const uniqueNames = [...new Set(transactions.map(t => t.name))].filter(Boolean).sort();
                const uniqueActions = [...new Set(transactions.map(t => t.action))].filter(Boolean).sort();
                const filteredTransactions = transactions.filter(t => {
                    return (historyFilters.name ? t.name === historyFilters.name : true) && (historyFilters.action ? t.action === historyFilters.action : true);
                });
                const totalPages = Math.ceil(filteredTransactions.length / ITEMS_PER_PAGE) || 1;
                const startIndex = (historyPage - 1) * ITEMS_PER_PAGE;
                const currentData = filteredTransactions.slice(startIndex, startIndex + ITEMS_PER_PAGE);

                return (
                    <div className="bg-gray-800 p-4 rounded-xl shadow-md border border-gray-700 h-full fade-in">
                         <div className="flex flex-col mb-4">
                            <div className="flex items-center mb-4"><button onClick={() => setView('dashboard')} className="mr-3 text-gray-400 hover:text-blue-400"><i data-lucide="arrow-left"></i></button><h2 className="text-xl font-bold text-gray-100">History</h2></div>
                            <div className="flex gap-2">
                                <select className="w-1/2 p-2 bg-gray-700 border border-gray-600 text-white rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" value={historyFilters.name} onChange={(e) => setHistoryFilters(prev => ({...prev, name: e.target.value}))}><option value="">All Helpers</option>{uniqueNames.map(n => <option key={n} value={n}>{n}</option>)}</select>
                                <select className="w-1/2 p-2 bg-gray-700 border border-gray-600 text-white rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" value={historyFilters.action} onChange={(e) => setHistoryFilters(prev => ({...prev, action: e.target.value}))}><option value="">All Actions</option>{uniqueActions.map(a => <option key={a} value={a}>{a}</option>)}</select>
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="min-w-full text-left text-sm text-gray-200">
                                <thead><tr className="bg-gray-900 border-b border-gray-700 text-gray-300"><th className="p-3">Date</th><th className="p-3">Name</th><th className="p-3">Action</th><th className="p-3 text-right">Amount</th><th className="p-3 text-center"></th></tr></thead>
                                <tbody>
                                    {currentData.length === 0 && <tr><td colSpan="5" className="p-4 text-center text-gray-500">No records match filters.</td></tr>}
                                    {currentData.map((t, idx) => (
                                        <React.Fragment key={idx}>
                                            <tr className="border-b border-gray-700 hover:bg-gray-700/50 transition-colors">
                                                <td className="p-3 whitespace-nowrap align-top text-gray-300">{new Date(t.date).toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: '2-digit' })}</td>
                                                <td className="p-3 align-top"><div className="font-medium text-gray-100">{t.name}</div>{t.notes && (<div className="text-[10px] text-gray-400 italic mt-1 leading-tight flex items-start gap-1"><span>•</span> {t.notes}</div>)}</td>
                                                <td className="p-3 text-xs align-top text-gray-400">{t.action}</td>
                                                <td className="p-3 text-right font-mono align-top text-gray-100">{t.amount}</td>
                                                <td className="p-3 text-center align-top">
                                                    <button onClick={() => handleDeleteTransaction(t)} className="text-gray-500 hover:text-red-400 transition" title="Delete record">
                                                        <i data-lucide="trash-2" size={14}></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        </React.Fragment>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                        {filteredTransactions.length > ITEMS_PER_PAGE && (
                            <div className="flex justify-between items-center mt-4 pt-4 border-t border-gray-700">
                                <button onClick={() => setHistoryPage(p => Math.max(1, p - 1))} disabled={historyPage === 1} className={`px-3 py-1 rounded text-sm font-medium ${historyPage === 1 ? 'text-gray-600 cursor-not-allowed' : 'text-blue-400 hover:bg-blue-900/50'}`}>Previous</button>
                                <span className="text-xs text-gray-400 font-medium">Page {historyPage} of {totalPages}</span>
                                <button onClick={() => setHistoryPage(p => Math.min(totalPages, p + 1))} disabled={historyPage === totalPages} className={`px-3 py-1 rounded text-sm font-medium ${historyPage === totalPages ? 'text-gray-600 cursor-not-allowed' : 'text-blue-400 hover:bg-blue-900/50'}`}>Next</button>
                            </div>
                        )}
                    </div>
                );
            };

            // --- AUTH CHECKER ---
            if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#111827]"><div className="spinner"></div></div>;
            if (!isAuthenticated) return <LoginScreen onUnlock={handleUnlock} />;

            // --- MAIN SWITCH ---
            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col text-gray-100">
                    <header className="bg-gray-800 p-4 shadow-md border-b border-gray-700 sticky top-0 z-10 flex justify-between items-center">
                        <div 
                            className="text-xl font-bold text-gray-100 flex items-center gap-2 cursor-pointer select-none"
                            onClick={() => setView('dashboard')}
                        >
                            <i data-lucide="home" className="text-blue-500"></i> HouseHelp
                        </div>
                    </header>
                    <main className="flex-1 p-4">
                        {view === 'dashboard' && renderDashboard()}
                        {view === 'add_transaction' && renderTransactionForm()}
                        {view === 'helpers' && renderHelpersManager()}
                        {view === 'history' && renderHistory()}
                        {view === 'tasks' && renderTasks()}
                        {view === 'calculator' && <Calculator onBack={() => setView('dashboard')} />}
                        {renderDeleteModal()}
                    </main>
                    <footer className="p-6 text-center text-xs text-gray-500 font-medium">Made with <span className="text-red-500 text-sm">♥</span> for Gangwals</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
