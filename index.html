<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>House OS</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .mini-scroll::-webkit-scrollbar { width: 4px; }
        .mini-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .card-gradient-purple { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
        .card-gradient-red { background: linear-gradient(135deg, #450a0a 0%, #7f1d1d 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const WEB_APP_URL = "YOUR_APPS_SCRIPT_URL_HERE"; // Replace with your actual URL

        const App = () => {
            const [view, setView] = useState('expenses');
            const [data, setData] = useState({ transactions: [], helpers: [], expenses: [], budgets: [], shopping: [] });
            const [loading, setLoading] = useState(true);
            const [pin, setPin] = useState('');
            const [isAuthenticated, setIsAuthenticated] = useState(false);

            useEffect(() => {
                const session = localStorage.getItem('house_os_session');
                if (session) {
                    const { expiry } = JSON.parse(session);
                    if (Date.now() < expiry) setIsAuthenticated(true);
                }
                fetchData();
            }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(WEB_APP_URL);
                    const result = await res.json();
                    if (result.status === 'success') setData(result.data);
                } catch (e) { console.error("Fetch error", e); }
                setLoading(false);
            };

            const handleLogin = () => {
                const admin = data.helpers.find(h => h.name === '__ADMIN__');
                if (admin && pin === admin.amount.toString()) {
                    setIsAuthenticated(true);
                    localStorage.setItem('house_os_session', JSON.stringify({ expiry: Date.now() + (30 * 24 * 60 * 60 * 1000) }));
                } else {
                    alert("Incorrect PIN");
                }
            };

            if (!isAuthenticated) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-6 bg-slate-950">
                        <div className="w-16 h-16 bg-purple-600 rounded-2xl mb-8 flex items-center justify-center shadow-lg shadow-purple-900/20">
                            <i data-lucide="home" className="text-white w-8 h-8"></i>
                        </div>
                        <h1 className="text-2xl font-bold mb-2">House OS</h1>
                        <p className="text-slate-500 mb-8 text-sm">Enter secure PIN to continue</p>
                        <div className="flex gap-4 mb-8">
                            {[1, 2, 3, 4].map(i => (
                                <div key={i} className={`w-4 h-4 rounded-full border-2 border-slate-700 ${pin.length >= i ? 'bg-purple-500 border-purple-500' : ''}`}></div>
                            ))}
                        </div>
                        <div className="grid grid-cols-3 gap-4 w-full max-w-xs">
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                                <button key={num} onClick={() => pin.length < 4 && setPin(p => p + num)} className="h-16 bg-slate-900 rounded-xl text-xl font-semibold hover:bg-slate-800 active:scale-95 transition">
                                    {num}
                                </button>
                            ))}
                            <button onClick={() => setPin('')} className="h-16 bg-slate-900 rounded-xl text-sm font-semibold uppercase text-slate-500">Clear</button>
                            <button onClick={() => pin.length < 4 && setPin(p => p + '0')} className="h-16 bg-slate-900 rounded-xl text-xl font-semibold">0</button>
                            <button onClick={handleLogin} className="h-16 bg-purple-600 rounded-xl flex items-center justify-center"><i data-lucide="check" className="text-white"></i></button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24 relative overflow-x-hidden">
                    {/* Header */}
                    <div className="p-6 pt-8">
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <h1 className="text-sm font-medium text-slate-500 uppercase tracking-widest">Monthly Spending</h1>
                                <div className="text-4xl font-bold mt-1">
                                    ₹{data.expenses.filter(e => e.status === 'Confirmed' && new Date(e.date).getMonth() === new Date().getMonth()).reduce((acc, curr) => acc + parseFloat(curr.amount), 0).toLocaleString()}
                                </div>
                            </div>
                            <button onClick={fetchData} className={`p-2 bg-slate-800 rounded-full ${loading ? 'animate-spin' : ''}`}>
                                <i data-lucide="refresh-cw" className="w-4 h-4 text-slate-400"></i>
                            </button>
                        </div>

                        {/* Quick Actions */}
                        <div className="grid grid-cols-4 gap-4 mb-8">
                            {[
                                { id: 'expenses', icon: 'credit-card', color: 'text-red-400', label: 'Spend' },
                                { id: 'helpers', icon: 'users', color: 'text-purple-400', label: 'Help' },
                                { id: 'shopping', icon: 'shopping-cart', color: 'text-blue-400', label: 'List' },
                                { id: 'history', icon: 'list', color: 'text-slate-400', label: 'Logs' }
                            ].map(btn => (
                                <button key={btn.id} onClick={() => setView(btn.id)} className="flex flex-col items-center gap-2">
                                    <div className={`w-12 h-12 rounded-2xl bg-slate-900 flex items-center justify-center border border-slate-800 ${view === btn.id ? 'ring-2 ring-slate-500' : ''}`}>
                                        <i data-lucide={btn.icon} className={`w-5 h-5 ${btn.color}`}></i>
                                    </div>
                                    <span className="text-[10px] uppercase font-semibold text-slate-500">{btn.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="px-6">
                        {view === 'expenses' && <ExpensesView data={data} refresh={fetchData} />}
                        {view === 'helpers' && <HelpersView data={data} refresh={fetchData} />}
                        {view === 'shopping' && <ShoppingView data={data} refresh={fetchData} />}
                        {view === 'history' && <HistoryView data={data} refresh={fetchData} />}
                    </main>

                    {/* Navigation */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-950/80 backdrop-blur-xl border-t border-slate-800 safe-bottom">
                        <div className="flex justify-around p-4">
                            {['expenses', 'helpers', 'shopping', 'history'].map(v => (
                                <button key={v} onClick={() => setView(v)} className={`p-2 rounded-xl transition ${view === v ? 'text-white' : 'text-slate-600'}`}>
                                    <i data-lucide={v === 'expenses' ? 'credit-card' : v === 'helpers' ? 'users' : v === 'shopping' ? 'shopping-cart' : 'list'}></i>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        };

        const HelpersView = ({ data, refresh }) => {
            const [expanded, setExpanded] = useState(null);

            const calculateStats = (name) => {
                const helperTransactions = data.transactions.filter(t => t.name === name);
                const totalDue = helperTransactions.filter(t => t.action === 'Salary Due').reduce((a, b) => a + parseFloat(b.amount || 0), 0);
                const totalPaid = helperTransactions.filter(t => t.action === 'Payment' || t.action === 'Payment/Advance').reduce((a, b) => a + parseFloat(b.amount || 0), 0);
                
                // Current Month Stats
                const now = new Date();
                const currentMonthDue = helperTransactions.filter(t => t.action === 'Salary Due' && new Date(t.date).getMonth() === now.getMonth() && new Date(t.date).getFullYear() === now.getFullYear()).reduce((a, b) => a + parseFloat(b.amount || 0), 0);
                const currentMonthPaid = helperTransactions.filter(t => (t.action === 'Payment' || t.action === 'Payment/Advance') && new Date(t.date).getMonth() === now.getMonth() && new Date(t.date).getFullYear() === now.getFullYear()).reduce((a, b) => a + parseFloat(b.amount || 0), 0);

                return {
                    balance: totalDue - totalPaid,
                    mDue: currentMonthDue,
                    mPaid: currentMonthPaid,
                    mBalance: currentMonthDue - currentMonthPaid
                };
            };

            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center mb-2">
                        <h2 className="text-xl font-bold">Househelp</h2>
                        <span className="text-xs bg-purple-900/30 text-purple-400 px-3 py-1 rounded-full border border-purple-800/50">
                            {data.helpers.filter(h => h.name !== '__ADMIN__').length} Workers
                        </span>
                    </div>

                    {data.helpers.filter(h => h.name !== '__ADMIN__').map(helper => {
                        const stats = calculateStats(helper.name);
                        const isExpanded = expanded === helper.name;

                        return (
                            <div key={helper.name} className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden transition-all duration-300">
                                <div 
                                    className="p-4 flex justify-between items-center cursor-pointer active:bg-slate-800/50"
                                    onClick={() => setExpanded(isExpanded ? null : helper.name)}
                                >
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 rounded-full bg-purple-600/20 flex items-center justify-center text-purple-400 font-bold">
                                            {helper.name.charAt(0)}
                                        </div>
                                        <div>
                                            <div className="font-bold text-slate-200">{helper.name}</div>
                                            <div className="text-[10px] text-slate-500 uppercase tracking-tighter">{helper.type} • ₹{helper.amount}/mo</div>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <div className={`text-sm font-mono font-bold ${stats.balance > 0 ? 'text-red-400' : 'text-green-400'}`}>
                                            ₹{stats.balance.toLocaleString()}
                                        </div>
                                        <div className="text-[8px] text-slate-500 uppercase">Net Balance</div>
                                    </div>
                                </div>

                                {isExpanded && (
                                    <div className="px-4 pb-4 animate-in fade-in slide-in-from-top-2 duration-300">
                                        {/* Monthly Breakdown */}
                                        <div className="grid grid-cols-3 gap-2 bg-slate-950/50 p-3 rounded-xl border border-slate-800 mb-4">
                                            <div className="text-center">
                                                <div className="text-[8px] text-slate-500 uppercase mb-1">Due (This Mo)</div>
                                                <div className="text-xs font-mono font-bold text-slate-300">₹{stats.mDue}</div>
                                            </div>
                                            <div className="text-center border-x border-slate-800">
                                                <div className="text-[8px] text-slate-500 uppercase mb-1">Paid (This Mo)</div>
                                                <div className="text-xs font-mono font-bold text-slate-300">₹{stats.mPaid}</div>
                                            </div>
                                            <div className="text-center">
                                                <div className="text-[8px] text-slate-500 uppercase mb-1">Month Bal</div>
                                                <div className={`text-xs font-mono font-bold ${stats.mBalance > 0 ? 'text-orange-400' : 'text-emerald-400'}`}>
                                                    ₹{stats.mBalance}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="flex gap-2">
                                            <button className="flex-1 bg-purple-600 hover:bg-purple-500 text-xs py-3 rounded-xl font-bold transition">Record Payment</button>
                                            <button className="flex-1 bg-slate-800 hover:bg-slate-700 text-xs py-3 rounded-xl font-bold transition">Adjust Due</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        };

        const ExpensesView = ({ data, refresh }) => {
            const confirmed = data.expenses.filter(e => e.status === 'Confirmed');
            const reviews = data.expenses.filter(e => e.status === 'Review');

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-xl font-bold">Spending</h2>
                        <button className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center shadow-lg shadow-red-900/20 active:scale-90 transition">
                            <i data-lucide="plus" className="text-white w-6 h-6"></i>
                        </button>
                    </div>

                    {/* Budgets */}
                    <div className="space-y-3">
                        {data.budgets.map(b => {
                            const spent = confirmed.filter(e => e.category === b.category).reduce((a, c) => a + parseFloat(c.amount), 0);
                            const perc = Math.min((spent / b.limit) * 100, 100);
                            return (
                                <div key={b.category} className="bg-slate-900/40 p-3 rounded-xl border border-slate-800/50">
                                    <div className="flex justify-between text-[10px] uppercase font-bold text-slate-500 mb-2">
                                        <span>{b.category}</span>
                                        <span className="font-mono">₹{spent} / ₹{b.limit}</span>
                                    </div>
                                    <div className="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                        <div className={`h-full rounded-full ${perc > 90 ? 'bg-red-500' : perc > 70 ? 'bg-yellow-500' : 'bg-green-500'}`} style={{ width: `${perc}%` }}></div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Review Section */}
                    {reviews.length > 0 && (
                        <div className="bg-orange-900/10 border border-orange-900/30 rounded-2xl p-4">
                            <h3 className="text-orange-400 text-xs font-bold uppercase mb-4 flex items-center gap-2">
                                <i data-lucide="alert-circle" className="w-3 h-3"></i> Needs Review ({reviews.length})
                            </h3>
                            <div className="space-y-3 max-h-60 overflow-y-auto mini-scroll pr-1">
                                {reviews.map(r => (
                                    <div key={r.id} className="bg-slate-900 p-3 rounded-xl border border-slate-800 flex justify-between items-center">
                                        <div className="min-w-0 pr-2">
                                            <div className="text-xs font-bold truncate text-slate-200">{r.merchant}</div>
                                            <div className="text-[10px] text-slate-500">{new Date(r.date).toLocaleDateString()}</div>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <span className="font-mono text-sm text-orange-400">₹{r.amount}</span>
                                            <i data-lucide="chevron-right" className="w-4 h-4 text-slate-600"></i>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Recent */}
                    <div>
                        <h3 className="text-xs font-bold text-slate-500 uppercase mb-3">Recent Transactions</h3>
                        <div className="space-y-2">
                            {confirmed.slice(0, 5).map((e, idx) => (
                                <div key={idx} className="flex justify-between items-center p-4 bg-slate-900/60 border border-slate-800 rounded-2xl">
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 rounded-lg bg-red-900/20 flex items-center justify-center">
                                            <i data-lucide="shopping-bag" className="w-4 h-4 text-red-400"></i>
                                        </div>
                                        <div>
                                            <div className="text-sm font-bold text-slate-200">{e.merchant}</div>
                                            <div className="text-[10px] text-slate-500 uppercase">{e.category}</div>
                                        </div>
                                    </div>
                                    <div className="font-mono font-bold text-red-400">-₹{parseFloat(e.amount).toLocaleString()}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const ShoppingView = ({ data }) => (
            <div className="space-y-4">
                <h2 className="text-xl font-bold mb-4">Shopping List</h2>
                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4">
                    <div className="flex gap-2 mb-6">
                        <input type="text" placeholder="Add item..." className="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none" />
                        <button className="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center"><i data-lucide="plus" className="text-white"></i></button>
                    </div>
                    <div className="space-y-2">
                        {data.shopping.map((item, i) => (
                            <div key={i} className={`flex items-center gap-3 p-3 rounded-xl border ${item.status === 'Done' ? 'bg-slate-950/50 border-slate-900' : 'bg-slate-900 border-slate-800'}`}>
                                <div className={`w-5 h-5 rounded border ${item.status === 'Done' ? 'bg-blue-600 border-blue-600' : 'border-slate-700'}`}>
                                    {item.status === 'Done' && <i data-lucide="check" className="w-4 h-4 text-white"></i>}
                                </div>
                                <span className={`text-sm ${item.status === 'Done' ? 'text-slate-600 line-through' : 'text-slate-200'}`}>{item.item}</span>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const HistoryView = ({ data }) => (
            <div className="space-y-4">
                <h2 className="text-xl font-bold mb-4">Ledger</h2>
                <div className="space-y-2">
                    {data.transactions.slice(0, 20).map((t, i) => (
                        <div key={i} className="p-4 bg-slate-900 border border-slate-800 rounded-2xl flex justify-between items-center">
                            <div>
                                <div className="text-xs font-bold text-slate-200">{t.name}</div>
                                <div className="text-[10px] text-slate-500 uppercase mt-1">{t.action} • {new Date(t.date).toLocaleDateString()}</div>
                            </div>
                            <div className={`font-mono font-bold ${t.action.includes('Payment') ? 'text-red-400' : 'text-slate-400'}`}>
                                ₹{parseFloat(t.amount).toLocaleString()}
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Lucide replacement listener
        setTimeout(() => lucide.replace(), 500);
    </script>
</body>
</html>
